<!DOCTYPE html>
<html>
<head>
    <title>Login - Authentic Reviewer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }

        .shape1 {
            width: 200px;
            height: 200px;
            background: white;
            top: 10%;
            left: 10%;
        }

        .shape2 {
            width: 150px;
            height: 150px;
            background: white;
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        /* Glass Card */
        .login-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.37);
            animation: fadeIn 1s ease;
            z-index: 10;
            width: 350px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            border-radius: 10px;
            background: rgba(255,255,255,0.8);
        }

        .btn-modern {
            border-radius: 25px;
            padding: 10px;
            background: white;
            color: #333;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-modern:hover {
            transform: scale(1.05);
            background: #f2f2f2;
        }

        a {
            color: white;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        h4 {
            font-weight: bold;
        }

    </style>
</head>

<body>

<!-- Floating shapes -->
<div class="shape shape1"></div>
<div class="shape shape2"></div>

<div class="login-card text-center">

    <h4 class="mb-4">Welcome Back 👋</h4>

    {% if error %}
    <div class="alert alert-danger text-center">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <div class="mb-3">
            <input type="text" name="username"
                   class="form-control"
                   placeholder="Username" required>
        </div>

        <div class="mb-3 position-relative">
            <input type="password"
                   name="password"
                   id="password"
                   class="form-control"
                   placeholder="Password" required>

            <span onclick="togglePassword()"
                  style="position:absolute; right:15px; top:10px; cursor:pointer;">
                👁
            </span>
        </div>

        <div class="form-check mb-3 text-start">
            <input class="form-check-input"
                   type="checkbox"
                   name="remember"
                   id="remember">
            <label class="form-check-label">
                Remember Me
            </label>
        </div>

        <button class="btn btn-modern w-100">
            Login
        </button>

        <div class="mt-3">
            <a href="/forgot">Forgot Password?</a>
        </div>

    </form>

    <div class="mt-3">
        <small>Don't have an account?</small><br>
        <a href="/register"><b>Create Account</b></a>
    </div>

</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    x.type = (x.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
