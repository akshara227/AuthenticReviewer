<!DOCTYPE html>
<html>
<head>
    <title>Authentic Reviewer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Particles JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* 🌗 Auto Theme */
        @media (prefers-color-scheme: dark) {
            body {
                background: #121212;
                color: white;
            }
        }

        @media (prefers-color-scheme: light) {
            body {
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: white;
            }
        }

        /* 🧊 Glass Card */
        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            z-index: 2;
        }

        /* 🔍 Logo Bounce */
        .logo {
            font-size: 60px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .title {
            font-size: 48px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 20px;
            margin-top: 10px;
            height: 30px;
        }

        .big-btn {
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            margin: 10px;
            transition: 0.3s;
        }

        .big-btn:hover {
            transform: scale(1.1);
        }

        /* 🌊 Wave Animation */
        .wave {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 150px;
            background: url('https://svgshare.com/i/uP_.svg');
            background-size: cover;
            animation: waveMove 10s linear infinite;
            opacity: 0.3;
        }

        @keyframes waveMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>

<body>

<!-- 🔥 Floating Particles -->
<div id="particles-js"></div>

<div class="d-flex justify-content-center align-items-center" style="height:100vh; position:relative; z-index:2;">
    <div class="glass-card">

        <div class="logo">🔍</div>
        <div class="title">Authentic Reviewer</div>
        <div class="subtitle" id="typing"></div>

        <br>

        <a href="/login" class="btn btn-light big-btn">Get Started</a>
        <br>
        <a href="/login" class="btn btn-success big-btn">Login</a>
        <a href="/register" class="btn btn-warning big-btn">Register</a>
        <a href="/admin" class="btn btn-danger big-btn">Admin</a>

    </div>
</div>

<!-- 🌊 Wave -->
<div class="wave"></div>

<!-- ⌨ Typing Effect -->
<script>
const text = "Fake Product Review Detection System";
let index = 0;

function typeEffect() {
    if (index < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 50);
    }
}

window.onload = typeEffect;
</script>

<!-- 🔥 Particles Config -->
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true },
  }
});
</script>

</body>
</html>
