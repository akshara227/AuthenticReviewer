<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>
<nav class="navbar p-3">
<a class="navbar-brand" href="/">Authentic Reviewer</a>
<div>
<a href="/dashboard" class="nav-link d-inline">Dashboard</a>
<a href="/logout" class="nav-link d-inline">Logout</a>
</div>
<button onclick="toggleDarkMode()" 
        id="darkToggle"
        class="btn btn-sm btn-dark ms-3">
    🌙
</button>
</nav>

<div class="container mt-5 fade-in">
<div class="card p-4 shadow">
<h3>👤 Profile Page</h3>
<p><strong>Username:</strong> {{ username }}</p>

<h4 class="mt-4">Your Reviews</h4>
<table class="table table-striped">
<tr>
<th>User</th>
<th>Review</th>
<th>Rating</th>
<th>Result</th>
</tr>

{% for review in reviews %}
<tr>
<td>{{ review[0] }}</td>
<td>{{ review[1] }}</td>
<td>{{ review[2] }} ⭐</td>
<td>{{ review[3] }}</td>
</tr>
{% endfor %}
</table>
</div>
</div>
<script>

// Apply saved mode on page load
window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("darkToggle").innerHTML = "☀";
    }
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    let button = document.getElementById("darkToggle");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        button.innerHTML = "☀";
    } else {
        localStorage.setItem("theme", "light");
        button.innerHTML = "🌙";
    }
}

</script>
</body>
</html>
