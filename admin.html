<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Authentic Reviewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #ff416c, #ff4b2b, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }

        .shape1 {
            width: 200px;
            height: 200px;
            background: white;
            top: 10%;
            left: 10%;
        }

        .shape2 {
            width: 150px;
            height: 150px;
            background: white;
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.15);
            padding: 40px;
            border-radius: 20px;
            color: white;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.37);
            animation: fadeIn 1s ease;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1; transform:translateY(0);}
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-modern {
            border-radius: 25px;
            padding: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-modern:hover {
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<div class="shape shape1"></div>
<div class="shape shape2"></div>

<div class="glass-card text-center">

    <h3 class="mb-4">🔐 Admin Panel Login</h3>

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="username"
                   class="form-control"
                   placeholder="Admin Username" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password"
                   class="form-control"
                   placeholder="Password" required>
        </div>

        <button class="btn btn-light btn-modern w-100">
            Login as Admin
        </button>
    </form>

</div>

</body>
</html>
