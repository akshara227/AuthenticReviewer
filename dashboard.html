<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% if session.get("user") %}
<script>
window.onload = function() {
    alert("🎉 Registration Successful! Welcome {{ session['user'] }}!");
}
</script>
{% endif %}
<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>
<nav class="navbar p-3">
<a class="navbar-brand" href="/">Authentic Reviewer</a>
<div>
<a href="/profile" class="nav-link d-inline">Profile</a>
<a href="/logout" class="nav-link d-inline">Logout</a>
</div>
<button onclick="toggleDarkMode()" 
        id="darkToggle"
        class="btn btn-sm btn-dark ms-3">
    🌙
</button>
</nav>

<div class="container mt-5 fade-in">
<div class="card p-4 shadow">

<h3>Write Product Review 🛒</h3>

<form method="post">
<textarea name="review" class="form-control mb-3" rows="4" placeholder="Write your review..."></textarea>

<label>Select Rating:</label>
<select name="rating" class="form-control mb-3">
<option value="5">⭐⭐⭐⭐⭐ (5)</option>
<option value="4">⭐⭐⭐⭐ (4)</option>
<option value="3">⭐⭐⭐ (3)</option>
<option value="2">⭐⭐ (2)</option>
<option value="1">⭐ (1)</option>
</select>

<button class="btn btn-custom w-100">Check Authenticity</button>
</form>

{% if result %}
<div class="alert alert-info mt-4">
<strong>Detection Result:</strong> {{ result }}
</div>
{% endif %}

</div>
</div>
<script>

// Apply saved mode on page load
window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("darkToggle").innerHTML = "☀";
    }
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    let button = document.getElementById("darkToggle");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        button.innerHTML = "☀";
    } else {
        localStorage.setItem("theme", "light");
        button.innerHTML = "🌙";
    }
}

</script>
</body>
</html>
